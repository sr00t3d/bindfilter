name: NEXUS Security Scan

on:
  push:
    branches: [ "main", "master", "develop" ]
  pull_request:
    branches: [ "main", "master", "develop" ]
  workflow_dispatch:

jobs:
  nexus-scan:
    name: Security Analysis
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      # 1. Trivy (SCA/Containers/Secrets)
      - name: Run Trivy Scan
        uses: aquasecurity/trivy-action@master
        continue-on-error: true
        with:
          scan-type: 'fs'
          ignore-unfixed: true
          format: 'json'
          output: 'trivy-report.json'

      - name: Send Trivy Report to NEXUS
        continue-on-error: true
        run: |
          if [ -f trivy-report.json ]; then
            curl -sk -X POST \
              -H "Authorization: Bearer ${{ secrets.NEXUS_TOKEN }}" \
              -H "Content-Type: application/json" \
              -d @trivy-report.json \
              "https://task.perciocastelo.com.br/api.php?action=security_import_trivy&repo=sr00t3d%2Fbindfilter"
          fi

      # 2. Grype (SCA/Dependencies)
      - name: Run Grype Scan
        uses: anchore/scan-action@v6
        continue-on-error: true
        with:
          path: "."
          fail-build: false
          output-format: json
          output-file: grype-report.json

      - name: Send Grype Report to NEXUS
        continue-on-error: true
        run: |
          if [ -f grype-report.json ]; then
            curl -sk -X POST \
              -H "Authorization: Bearer ${{ secrets.NEXUS_TOKEN }}" \
              -H "Content-Type: application/json" \
              -d @grype-report.json \
              "https://task.perciocastelo.com.br/api.php?action=security_import_grype&repo=sr00t3d%2Fbindfilter"
          fi

      # 3. Semgrep (SAST)
      - name: Cache Pip Packages for Semgrep
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-semgrep
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Run Semgrep SAST Scan
        continue-on-error: true
        run: |
          pip install semgrep
          semgrep scan --config=auto --json --output semgrep-report.json --exclude="node_modules" --exclude="vendor" --exclude="dist" --exclude="backups" --exclude="bower_components" || true

      - name: Send Semgrep Report to NEXUS
        continue-on-error: true
        run: |
          if [ -f semgrep-report.json ]; then
            curl -sk -X POST \
              -H "Authorization: Bearer ${{ secrets.NEXUS_TOKEN }}" \
              -H "Content-Type: application/json" \
              -d @semgrep-report.json \
              "https://task.perciocastelo.com.br/api.php?action=security_import_semgrep&repo=sr00t3d%2Fbindfilter"
          fi

      # 4. Wordfence CLI (WordPress Malware/Vulnerability Scan)
      - name: Check if WordPress Project
        id: check-wp
        run: |
          if find . -maxdepth 3 \( -name "wp-config.php" -o -name "wp-content" -o -name "style.css" \) | grep -q .; then
            echo "is_wp=true" >> $GITHUB_OUTPUT
            echo "WordPress signature found."
          else
            echo "is_wp=false" >> $GITHUB_OUTPUT
            echo "Not a WordPress project."
          fi

      - name: Setup Python for Wordfence
        if: steps.check-wp.outputs.is_wp == 'true'
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Wordfence CLI
        if: steps.check-wp.outputs.is_wp == 'true'
        run: pip install wordfence

      - name: Run Wordfence Vulnerability Scan
        if: steps.check-wp.outputs.is_wp == 'true'
        continue-on-error: true
        run: |
          wordfence vuln-scan --output-format json --output-path wordfence-report.json ./ || true

      - name: Send Wordfence Report to NEXUS
        if: steps.check-wp.outputs.is_wp == 'true'
        continue-on-error: true
        run: |
          if [ -f wordfence-report.json ]; then
            curl -sk -X POST \
              -H "Authorization: Bearer ${{ secrets.NEXUS_TOKEN }}" \
              -H "Content-Type: application/json" \
              -d @wordfence-report.json \
              "https://task.perciocastelo.com.br/api.php?action=security_import_wordfence&repo=sr00t3d%2Fbindfilter"
          fi

      # 5. Gitleaks (Secrets)
      - name: Run Gitleaks Secrets Scan
        continue-on-error: true
        run: |
          wget -q https://github.com/gitleaks/gitleaks/releases/download/v8.18.2/gitleaks_8.18.2_linux_x64.tar.gz
          tar -xf gitleaks_8.18.2_linux_x64.tar.gz
          ./gitleaks detect --report-path gitleaks-report.json --redact --exit-code 0 || true

      - name: Send Gitleaks Report to NEXUS
        continue-on-error: true
        run: |
          if [ -f gitleaks-report.json ]; then
            curl -sk -X POST \
              -H "Authorization: Bearer ${{ secrets.NEXUS_TOKEN }}" \
              -H "Content-Type: application/json" \
              -d @gitleaks-report.json \
              "https://task.perciocastelo.com.br/api.php?action=security_import_gitleaks&repo=sr00t3d%2Fbindfilter"
          fi

      # 6. Composer Audit (PHP Dependencies)
      - name: Check if PHP Project
        id: check-composer
        run: |
          if find . -maxdepth 3 -name "composer.json" | grep -q .; then
            echo "is_composer=true" >> $GITHUB_OUTPUT
            echo "composer.json found."
          else
            echo "is_composer=false" >> $GITHUB_OUTPUT
            echo "composer.json not found."
          fi

      - name: Run Composer Audit Scan
        if: steps.check-composer.outputs.is_composer == 'true'
        continue-on-error: true
        run: |
          if [ -f composer.json ]; then
            composer audit --format=json > composer-report.json || true
          else
            composer_file=$(find . -maxdepth 3 -name "composer.json" | head -n 1)
            if [ -n "$composer_file" ]; then
              (cd "$(dirname "$composer_file")" && composer audit --format=json) > composer-report.json || true
            fi
          fi

      - name: Send Composer Audit Report to NEXUS
        if: steps.check-composer.outputs.is_composer == 'true'
        continue-on-error: true
        run: |
          if [ -f composer-report.json ]; then
            curl -sk -X POST \
              -H "Authorization: Bearer ${{ secrets.NEXUS_TOKEN }}" \
              -H "Content-Type: application/json" \
              -d @composer-report.json \
              "https://task.perciocastelo.com.br/api.php?action=security_import_composer&repo=sr00t3d%2Fbindfilter"
          fi

      # 7. NPM Audit (NodeJS Dependencies)
      - name: Check if NodeJS Project
        id: check-npm
        run: |
          if find . -maxdepth 3 -name "package.json" | grep -q .; then
            echo "is_npm=true" >> $GITHUB_OUTPUT
            echo "package.json found."
          else
            echo "is_npm=false" >> $GITHUB_OUTPUT
            echo "package.json not found."
          fi

      - name: Run NPM Audit Scan
        if: steps.check-npm.outputs.is_npm == 'true'
        continue-on-error: true
        run: |
          if [ -f package.json ]; then
            npm audit --json > npm-report.json || true
          else
            package_file=$(find . -maxdepth 3 -name "package.json" | head -n 1)
            if [ -n "$package_file" ]; then
              (cd "$(dirname "$package_file")" && npm audit --json) > npm-report.json || true
            fi
          fi

      - name: Send NPM Audit Report to NEXUS
        if: steps.check-npm.outputs.is_npm == 'true'
        continue-on-error: true
        run: |
          if [ -f npm-report.json ]; then
            curl -sk -X POST \
              -H "Authorization: Bearer ${{ secrets.NEXUS_TOKEN }}" \
              -H "Content-Type: application/json" \
              -d @npm-report.json \
              "https://task.perciocastelo.com.br/api.php?action=security_import_npm&repo=sr00t3d%2Fbindfilter"
          fi
